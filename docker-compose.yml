services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: unumcp
      POSTGRES_PASSWORD: unumcp
      POSTGRES_DB: unumcp
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unumcp"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  pgdata:
